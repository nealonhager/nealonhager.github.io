<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Redirecting...</title>
        <script>
            const redirectUrl = `${window.location.pathname}${window.location.search}${window.location.hash}`;

            sessionStorage.setItem("redirectPath", redirectUrl);
            window.location.replace("/");
        </script>
    </head>
    <body></body>
</html>
